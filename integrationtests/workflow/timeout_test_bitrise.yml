format_version: 1.3.0
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  timeout:
    steps:
    - script@1.2.1:
        timeout: 5
        inputs:
        - content: echo "test" >> "$TIMEOUT_TEST_FILE_PTH_1"; sleep 15; echo "test" >> "$TIMEOUT_TEST_FILE_PTH_2"

  multiple_timeout:
    steps:
    - script@1.2.1:
        timeout: 2
    - script@1.2.1:
        timeout: 2
    - script@1.2.1:
        timeout: 2
    - script@1.2.1:
        timeout: 2
    - script@1.2.1:
        timeout: 20
        inputs:
        - content: echo "test" >> "$TIMEOUT_TEST_FILE_PTH_1"; sleep 15; echo "test" >> "$TIMEOUT_TEST_FILE_PTH_2"
