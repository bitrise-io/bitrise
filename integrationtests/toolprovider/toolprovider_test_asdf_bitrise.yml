format_version: "17"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

tools:
  nodejs: 22:latest

tool_config:
  provider: asdf

workflows:
  toolprovider_test:
    steps:
      - script@1:
          title: Test activated tool
          inputs:
            - content: |-
                set -ex
                asdf current
                asdf latest nodejs 22
                asdf exec node --version
                node --version
                node --version | grep "22"
